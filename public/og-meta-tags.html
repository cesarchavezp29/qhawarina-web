<!-- ============================================================
     QHAWARINA — Open Graph & Twitter Card Meta Tags
     
     HOW TO USE:
     1. Put all og-*.png files in your /public/ folder (or wherever 
        static assets live in your framework)
     2. Add the appropriate <meta> block to each page's <head>
     3. Replace YOUR_DOMAIN with https://qhawarina.pe
     4. Test with: https://opengraph.xyz or WhatsApp/Twitter
     
     IMPORTANT: og:image must be an absolute URL, not relative.
     WhatsApp caches aggressively — append ?v=2 to bust cache
     when updating images.
     ============================================================ -->
